<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — FIERRO</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" media="(prefers-color-scheme: dark)" href="favicon_blanco.png">
<link rel="icon" type="image/png" media="(prefers-color-scheme: light)" href="favicon_negro.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon_blanco.png">
<meta name="theme-color" content="#000000">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }


  /* Background: video de bloopers o fallback */
  .bg-video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.35;
    filter: grayscale(1) contrast(1.1);
    z-index: 1;
  }

  /* Header */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 48px;
  }
  .logo { width: 105px; height: auto; cursor: pointer; display: block; }
  nav a {
    color: #fff;
    text-decoration: none;
    font-family: "DM Sans", sans-serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    padding-bottom: 4px;
    transition: opacity 0.2s;
  }
  nav a:hover { opacity: 0.6; }

  /* Contenido principal */
  main {
    position: relative;
    z-index: 5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 48px;
  }
  .error-code {
    font-size: clamp(120px, 22vw, 360px);
    font-weight: 500;
    letter-spacing: -0.05em;
    line-height: 0.85;
    margin-bottom: 24px;
    font-variant-numeric: tabular-nums;
    position: relative;
  }
  .error-code::before {
    content: '404';
    position: absolute;
    inset: 0;
    color: transparent;
    -webkit-text-stroke: 1px rgba(255,255,255,0.2);
    transform: translate(8px, 8px);
    z-index: -1;
  }
  .error-meta {
    font-family: "DM Sans", sans-serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    opacity: 0.55;
    margin-bottom: 36px;
  }
  .error-title {
    font-size: clamp(20px, 2.2vw, 32px);
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: 12px;
    max-width: 600px;
  }
  .error-subtitle {
    font-family: "DM Sans", sans-serif;
    font-size: 12px;
    letter-spacing: 0.05em;
    opacity: 0.65;
    margin-bottom: 48px;
    max-width: 600px;
    text-transform: uppercase;
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    font-family: "DM Sans", sans-serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: #fff;
    text-decoration: none;
    border-bottom: 1px solid #fff;
    padding-bottom: 6px;
    transition: opacity 0.2s, gap 0.2s;
  }
  .back-btn:hover { opacity: 0.7; gap: 18px; }

  /* Glitch sutil en el 404 */
  @keyframes glitch {
    0%, 100% { transform: translate(0); }
    20% { transform: translate(-2px, 1px); }
    40% { transform: translate(2px, -1px); }
    60% { transform: translate(-1px, -1px); }
    80% { transform: translate(1px, 2px); }
  }
  .error-code {
    animation: glitch 4s infinite;
    animation-timing-function: steps(1);
  }

  /* Footer */
  footer {
    position: fixed;
    bottom: 0; left: 0;
    z-index: 10;
    padding: 28px 48px;
    font-family: "DM Sans", sans-serif;
    font-size: 10px;
    letter-spacing: 0.08em;
    opacity: 0.55;
  }

  /* Mobile */
  @media (max-width: 800px) {
    header, footer { padding: 18px 20px; }
    .logo { width: 75px; }
    main { padding: 0 20px; }
  }
</style>
</head>
<body>


<!-- Video de bloopers de fondo (cuando esté disponible, se llama bloopers.mp4) -->
<video class="bg-video" autoplay muted loop playsinline onerror="this.style.display='none'">
  <source src="bloopers.mp4" type="video/mp4">
</video>

      <path d="M489.66 0.0101852V46.3695C489.66 83.0828 480.389 107.046 464.932 121.973C485.647 149.04 495.847 194.778 495.847 217.805H465.548C465.548 199.764 459.361 161.179 438.656 137.531C430.932 140.329 422.581 142.202 413.614 143.443V217.805H383.942V0.0101852H489.67H489.66ZM459.675 46.3695V29.8751H413.614V113.568C441.437 109.518 459.675 94.8963 459.675 46.3593V46.3695Z" fill="white"/>

  </a>
  <nav>
    <a href="/">VOLVER</a>
  </nav>
</header>

<main>
  <div class="error-code">404</div>
  <div class="error-meta">SCENE NOT FOUND</div>
  <div class="error-title">Esta página no existe.</div>
  <div class="error-subtitle">Como una toma que no quedó en el corte final.</div>
  <a href="/" class="back-btn">VOLVER AL CORTE FINAL <span>→</span></a>
</main>

<footer>FIERRO 2026</footer>

</body>
</html>
