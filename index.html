<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    width: 100%;
    min-height: 100%;
    overflow-x: hidden;
    /* Color del fondo del navegador en overscroll (iOS Safari) */
    background-color: #000;
  }
  html {
    background: #000 !important;
    /* Sin padding aquí: las safe-area se manejan en cada componente */
  }
  body {
    overflow-y: hidden;
    background: #000;
    /* Prevenir el "bounce" blanco al deslizar para arriba o abajo en iOS */
    overscroll-behavior: none;
    -webkit-overflow-scrolling: touch;
  }
  /* En mobile, permitir scroll vertical normal */
  @media (max-width: 800px) {
    html, body {
      height: auto;
      min-height: 100%;
      min-height: 100dvh;
      overflow-y: auto !important;
      overscroll-behavior-y: contain;
    }
    /* "Stretch" negro que cubre el rebote elástico de Safari iOS */
    body::before {
      content: '';
      position: fixed;
      top: -100px; left: 0; right: 0;
      height: 100px;
      background: #000;
      z-index: -1;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; left: 0; right: 0;
      height: 100px;
      background: #000;
      z-index: -1;
      pointer-events: none;
    }
  }

  /* Ocultar cursor nativo en desktop (en mobile se mantiene el touch normal) */
  @media (hover: hover) and (pointer: fine) {
    html, body, a, button, [role="button"], .proj-card, [data-page], .lang span, #logoLink {
      cursor: none !important;
    }
  }

  /* ==== CURSOR CRUZ DE CÁMARA ==== */
  .cursor {
    position: fixed;
    top: 0; left: 0;
    width: 32px;
    height: 32px;
    pointer-events: none;
    z-index: 10000;
    transform: translate(-50%, -50%);
    transition: width 0.2s ease, height 0.2s ease, opacity 0.2s ease;
    mix-blend-mode: difference;
    display: none;
  }
  @media (hover: hover) and (pointer: fine) {
    .cursor { display: block; }
  }
  .cursor.hover {
    width: 56px;
    height: 56px;
  }
  .cursor svg {
    width: 100%;
    height: 100%;
  }
  .cursor circle {
    transition: r 0.2s ease;
  }
  .cursor line {
    stroke: #fff;
    stroke-width: 1;
    transition: stroke-width 0.2s ease;
  }
  .cursor.hover line { stroke-width: 0.7; }

  :root {
    --side-margin: 48px;
    --top-margin: 28px;
  }

  /* ==== FLASH DE TRANSICIÓN ==== */
  .flash {
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease-out;
  }
  .flash.active {
    opacity: 0.85;
    transition: opacity 0.06s ease-in;
  }

  /* ==== HEADER ==== */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--top-margin) var(--side-margin);
    pointer-events: none;
  }
  header > * { pointer-events: auto; }
  .logo { width: 105px; height: auto; cursor: pointer; display: block; }
  nav { display: flex; gap: 36px; align-items: center; }
  nav a {
    color: #fff;
    text-decoration: none;
    font-family: "SF Mono", Menlo, Monaco, monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    padding-bottom: 4px;
    transition: opacity 0.2s;
  }
  nav a:hover { opacity: 0.6; }
  nav a.active { border-bottom: 1px solid #fff; }
  .lang { display: flex; gap: 12px; margin-left: 14px; font-family: "SF Mono", monospace; font-size: 10px; letter-spacing: 0.2em; }
  .lang span { cursor: pointer; opacity: 0.45; transition: opacity 0.2s; }
  .lang span.active { opacity: 1; border-bottom: 1px solid #fff; padding-bottom: 2px; }

  section { display: none; }
  section.active { display: block; }

  /* ==== HOME ==== */
  .home-reel {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
  }
  .home-reel video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1.04);
    transition: transform 0.4s ease-out;
  }
  /* Por defecto (desktop): mostrar horizontal, ocultar vertical */
  .home-reel .reel-vertical { display: none; }
  .home-reel .reel-horizontal { display: block; }
  /* En pantallas verticales (mobile portrait): invertir */
  @media (max-aspect-ratio: 1/1) {
    .home-reel .reel-horizontal { display: none; }
    .home-reel .reel-vertical { display: block; }
  }
  .home-icons {
    position: absolute;
    bottom: var(--top-margin);
    right: var(--side-margin);
    display: flex;
    gap: 24px;
    z-index: 2;
  }
  .home-icons a {
    color: #fff;
    opacity: 0.85;
    transition: opacity 0.2s, transform 0.2s;
    display: block;
  }
  .home-icons a:hover {
    opacity: 1;
    transform: translateY(-2px);
  }
  .home-icons svg {
    width: 22px;
    height: 22px;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
  }

  /* ==== TRABAJOS / GRILLA 2x2 (entra en una pantalla) ==== */
  .work-page {
    height: 100vh;
    width: 100vw;
    padding: calc(var(--top-margin) + 70px) var(--side-margin) calc(var(--top-margin) + 50px);
    display: flex;
    flex-direction: column;
  }
  .section-label {
    font-family: "SF Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    opacity: 0.5;
    margin-bottom: 16px;
    flex-shrink: 0;
  }
  .work-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 14px;
    flex: 1;
    min-height: 0;
    width: 100%;
  }
  .proj-card {
    cursor: pointer;
    position: relative;
    overflow: hidden;
    background: #111;
    min-height: 0;
  }
  .proj-card video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease, filter 0.3s ease;
    filter: brightness(0.85);
  }
  .proj-card:hover video {
    transform: scale(1.04);
    filter: brightness(1);
  }
  .proj-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 45%);
    pointer-events: none;
  }
  .proj-label {
    position: absolute;
    bottom: 16px;
    left: 20px;
    right: 20px;
    z-index: 2;
    display: flex;
    align-items: baseline;
    gap: 12px;
    font-size: clamp(15px, 1.5vw, 22px);
    font-weight: 500;
    letter-spacing: -0.01em;
    pointer-events: none;
  }
  .proj-label .artist {
    font-family: "SF Mono", monospace;
    font-size: clamp(9px, 0.8vw, 12px);
    letter-spacing: 0.18em;
    opacity: 0.6;
    font-weight: 400;
    text-transform: uppercase;
  }

  /* ==== PÁGINA DE PROYECTO (sin scroll, full screen) ==== */
  .project-page {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }
  .project-video-wrap {
    position: absolute;
    inset: 0;
    background: #000;
  }
  .project-video-wrap video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  /* Gradiente full-width que cubre toda la parte inferior */
  .project-gradient {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 50%;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 40%, rgba(0,0,0,0) 100%);
    z-index: 2;
    pointer-events: none;
  }
  .project-overlay {
    position: absolute;
    bottom: 80px;
    left: var(--side-margin);
    right: var(--side-margin);
    z-index: 3;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 40px;
  }
  .project-title {
    font-size: clamp(40px, 5.5vw, 80px);
    font-weight: 500;
    letter-spacing: -0.03em;
    line-height: 0.95;
    margin-bottom: 10px;
  }
  .project-artist {
    font-family: "SF Mono", monospace;
    font-size: 12px;
    letter-spacing: 0.22em;
    opacity: 0.75;
  }
  .project-credits {
    font-family: "SF Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-align: right;
    line-height: 2;
    min-width: 280px;
  }
  .project-credits .row {
    display: flex;
    justify-content: space-between;
    gap: 24px;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.18);
  }
  .project-credits .row:last-child { border-bottom: none; }
  .project-credits .label { opacity: 0.55; }

  .project-bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 90;
    display: none;
    justify-content: center;
    padding: 18px var(--side-margin);
    font-family: "SF Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
  }
  .project-bottom-bar.visible { display: flex; }
  .project-bottom-bar span {
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
    color: #fff;
  }
  .project-bottom-bar span:hover { opacity: 1; }

  /* ==== CONTACTO ==== */
  .contact-page {
    padding: 140px var(--side-margin) 80px;
    height: 100vh;
    display: none;
    flex-direction: column;
    justify-content: center;
  }
  .contact-page.active { display: flex; }
  .contact-mail {
    font-size: clamp(36px, 6vw, 90px);
    font-weight: 500;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 48px;
    word-break: break-all;
  }
  .contact-mail a { color: #fff; text-decoration: none; transition: opacity 0.2s; }
  .contact-mail a:hover { opacity: 0.7; }
  .contact-mail .at { opacity: 0.5; }
  .contact-links {
    display: flex;
    gap: 36px;
    font-family: "SF Mono", monospace;
    font-size: 12px;
    letter-spacing: 0.22em;
    flex-wrap: wrap;
  }
  .contact-links a {
    color: #fff;
    text-decoration: none;
    border-bottom: 1px solid #fff;
    padding-bottom: 4px;
    transition: opacity 0.2s;
  }
  .contact-links a:hover { opacity: 0.7; }
  .contact-location {
    margin-top: 56px;
    font-family: "SF Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    opacity: 0.45;
  }

  /* ==== FOOTER ==== */
  footer {
    position: fixed;
    bottom: 0; left: 0;
    z-index: 50;
    padding: var(--top-margin) var(--side-margin);
    font-family: "SF Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    opacity: 0.55;
    pointer-events: none;
  }
  footer.hidden { display: none; }

  /* ==== MOBILE ==== */
  @media (max-width: 800px) {
    :root {
      --side-margin: 20px;
      --top-margin: 18px;
    }
    .logo { width: 75px; }
    nav { gap: 18px; }
    .lang { margin-left: 6px; }

    /* Home: ocupa toda la pantalla */
    .home-reel {
      width: 100vw;
      height: 100svh;
      min-height: 100vh;
    }
    .home-icons svg { width: 20px; height: 20px; }
    .home-icons { gap: 20px; }

    /* Trabajos: ya no es altura fija, scroll natural */
    .work-page {
      height: auto;
      min-height: 100vh;
      padding-top: 80px;
      padding-bottom: 80px;
    }
    /* Ocultar el "TRABAJOS" duplicado en mobile (ya está en el menú) */
    .work-page > .section-label {
      display: none;
    }
    .work-grid {
      grid-template-columns: 1fr;
      grid-template-rows: repeat(4, 56vw);
      gap: 10px;
      flex: 0 0 auto;
    }
    .proj-label {
      bottom: 14px;
      left: 16px;
      right: 16px;
      gap: 10px;
      font-size: 16px;
    }
    .proj-label .artist {
      font-size: 10px;
      letter-spacing: 0.15em;
    }

    /* Proyecto: full screen sin scroll, ya está bien */
    .project-page {
      height: 100svh;
      min-height: 100vh;
    }
    .project-overlay {
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
      bottom: 80px;
    }
    .project-credits {
      text-align: left;
      min-width: 0;
      width: 100%;
      font-size: 10px;
    }
    .project-title { font-size: clamp(36px, 11vw, 64px); }

    /* Contacto: scroll y mail más chico para que no se corte */
    .contact-page {
      height: auto;
      min-height: 100vh;
      padding-top: 110px;
      padding-bottom: 100px;
    }
    .contact-mail {
      font-size: clamp(28px, 9vw, 56px);
      margin-bottom: 36px;
      word-break: break-word;
      overflow-wrap: break-word;
      line-height: 1.05;
    }

    /* Footer: que no se pise con contenido, fondo opaco */
    footer {
      position: relative;
      bottom: auto;
      left: auto;
      background: #000;
      padding: 32px 20px 24px;
    }

    /* Header: fondo más opaco para que se lea sobre videos */
    header {
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
      padding: 16px 20px 24px;
    }

    /* Project bottom bar: opaca y con fondo en mobile */
    .project-bottom-bar {
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 16px 20px;
    }
  }
</style>
</head>

<script>
// ============================================
// DATOS
// ============================================
const projects = [
  { id:0, title:'Viajes de Amor', artist:'JERO JONES', year:'2025', dir:'Lulo Innocenti', prod:'Mayra Zuvilivia · Bruno Levy', video:'viajes-de-amor.mp4' },
  { id:1, title:'ENERC Se Proyecta', artist:'ENERC', year:'2025', dir:'Lulo Innocenti', prod:'Eric Ovelar', video:'enerc.mp4' },
  { id:2, title:'Fervor', artist:'COBERTURA DE SHOW', year:'2026', dir:'Lulo Innocenti', prod:'Bruno Levy · Facundo López Estévez', video:'fervor.mp4' },
  { id:3, title:'Experimento Stanislavski', artist:'BARS 2025', year:'2024', dir:'Lulo Innocenti · Thiago Zavallone', prod:'Bruno Levy · Eric Ovelar', video:'stanislavski.mp4' }
];

// ============================================
// I18N
// ============================================
const translations = {
  es: {
    'nav.work': 'TRABAJOS',
    'nav.contact': 'CONTACTO',
    'nav.backToWork': 'VOLVER A TRABAJOS',
    'section.work': 'TRABAJOS',
    'section.contact': 'CONTACTO',
    'contact.location': 'BUENOS AIRES — ARG',
    'credits.direction': 'DIRECCIÓN',
    'credits.production': 'PRODUCCIÓN',
    'proj.fervor.subtitle': 'COBERTURA DE SHOW'
  },
  en: {
    'nav.work': 'WORK',
    'nav.contact': 'CONTACT',
    'nav.backToWork': 'BACK TO WORK',
    'section.work': 'WORK',
    'section.contact': 'CONTACT',
    'contact.location': 'BUENOS AIRES — ARG',
    'credits.direction': 'DIRECTION',
    'credits.production': 'PRODUCTION',
    'proj.fervor.subtitle': 'LIVE SHOW COVERAGE'
  }
};

let currentLang = 'es';

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (translations[currentLang][key]) {
      el.textContent = translations[currentLang][key];
    }
  });
  document.documentElement.lang = currentLang;
  // Re-renderizar el proyecto si está activo, para traducir los labels
  if (document.getElementById('page-project').classList.contains('active')) {
    const currentProj = document.querySelector('.project-page')?.dataset.projectId;
    if (currentProj !== undefined) {
      renderProject(projects[parseInt(currentProj)], false);
    }
  }
}

// ============================================
// FLASH
// ============================================
function triggerFlash(callback) {
  const flash = document.getElementById('flash');
  flash.classList.add('active');
  setTimeout(() => {
    if (callback) callback();
    setTimeout(() => flash.classList.remove('active'), 60);
  }, 80);
}

// ============================================
// NAVIGATION
// ============================================
const sections = ['home','work','project','contact'];

function showPage(page){
  triggerFlash(() => {
    sections.forEach(s => {
      document.getElementById('page-'+s).classList.remove('active');
    });
    document.getElementById('page-'+page).classList.add('active');

    document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
    const navMap = { work: 'work', contact: 'contact', project: 'work' };
    if(navMap[page]){
      document.querySelectorAll('nav a[data-page]').forEach(a => {
        if(a.getAttribute('data-page') === navMap[page]) a.classList.add('active');
      });
    }

    const bottomBar = document.getElementById('projectBottomBar');
    const footer = document.getElementById('mainFooter');
    const isMobile = window.matchMedia('(max-width: 800px)').matches;

    if(page === 'project'){
      bottomBar.classList.add('visible');
      footer.classList.add('hidden');
    } else {
      bottomBar.classList.remove('visible');
      // En mobile, ocultar footer en home también (el reel ocupa todo)
      if (isMobile && page === 'home') {
        footer.classList.add('hidden');
      } else {
        footer.classList.remove('hidden');
      }
    }

    // Scroll al top siempre que cambies de página
    window.scrollTo(0, 0);
  });
}

function renderProject(p, withFlash = true){
  const t = translations[currentLang];
  const html = `
    <div class="project-video-wrap">
      <video autoplay muted loop playsinline>
        <source src="${p.video}" type="video/mp4">
      </video>
    </div>
    <div class="project-gradient"></div>
    <div class="project-overlay">
      <div class="project-overlay-text">
        <h1 class="project-title">${p.title}</h1>
        <div class="project-artist">${p.artist} · ${p.year}</div>
      </div>
      <div class="project-credits">
        <div class="row"><span class="label">${t['credits.direction']}</span><span>${p.dir}</span></div>
        <div class="row"><span class="label">${t['credits.production']}</span><span>${p.prod}</span></div>
      </div>
    </div>
  `;
  const container = document.getElementById('project-content');
  container.innerHTML = html;
  container.dataset.projectId = p.id;
}

// ============================================
// EVENT LISTENERS
// ============================================
document.getElementById('navBackWork').addEventListener('click', () => showPage('work'));

document.querySelectorAll('[data-page]').forEach(el => {
  el.addEventListener('click', (e) => {
    e.preventDefault();
    showPage(el.getAttribute('data-page'));
  });
});

document.getElementById('logoLink').addEventListener('click', (e) => {
  e.preventDefault();
  showPage('home');
});

document.querySelectorAll('.proj-card').forEach(card => {
  card.addEventListener('click', () => {
    const id = parseInt(card.getAttribute('data-id'));
    triggerFlash(() => {
      renderProject(projects[id], false);
      sections.forEach(s => document.getElementById('page-'+s).classList.remove('active'));
      document.getElementById('page-project').classList.add('active');
      document.getElementById('projectBottomBar').classList.add('visible');
      document.getElementById('mainFooter').classList.add('hidden');
      document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
      document.querySelectorAll('nav a[data-page="work"]').forEach(a => a.classList.add('active'));
    });
  });
});

// Language switch
document.querySelectorAll('.lang span').forEach(s => {
  s.addEventListener('click', () => {
    document.querySelectorAll('.lang span').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
    currentLang = s.getAttribute('data-lang');
    applyTranslations();
  });
});

// ============================================
// INICIALIZACIÓN: ocultar footer en mobile al cargar (porque home arranca activo)
// ============================================
(function initFooterState() {
  const isMobile = window.matchMedia('(max-width: 800px)').matches;
  const homeActive = document.getElementById('page-home').classList.contains('active');
  if (isMobile && homeActive) {
    document.getElementById('mainFooter').classList.add('hidden');
  }
})();

// ============================================
// CARGAR SOLO EL REEL CORRECTO SEGÚN ORIENTACIÓN
// (Ahorra ~30MB de banda al usuario)
// ============================================
(function initReelLoader() {
  const isPortrait = window.matchMedia('(max-aspect-ratio: 1/1)').matches;
  const horizontal = document.querySelector('.home-reel .reel-horizontal');
  const vertical = document.querySelector('.home-reel .reel-vertical');

  if (isPortrait) {
    // Pantalla vertical: solo cargar el vertical, eliminar source del horizontal
    if (horizontal) {
      horizontal.removeAttribute('src');
      const source = horizontal.querySelector('source');
      if (source) source.remove();
      horizontal.load();
    }
  } else {
    // Pantalla horizontal: solo cargar el horizontal
    if (vertical) {
      vertical.removeAttribute('src');
      const source = vertical.querySelector('source');
      if (source) source.remove();
      vertical.load();
    }
  }
})();

// Si cambia el viewport (rotar pantalla, redimensionar), actualizar
window.addEventListener('resize', () => {
  const isMobile = window.matchMedia('(max-width: 800px)').matches;
  const footer = document.getElementById('mainFooter');
  const homeActive = document.getElementById('page-home').classList.contains('active');
  const projectActive = document.getElementById('page-project').classList.contains('active');

  if (projectActive) {
    footer.classList.add('hidden');
  } else if (isMobile && homeActive) {
    footer.classList.add('hidden');
  } else {
    footer.classList.remove('hidden');
  }
});

// ============================================
// CURSOR PERSONALIZADO (cruz de cámara)
// ============================================
(function initCursor() {
  // Solo si hay mouse fino (no en touch)
  if (!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;

  const cursor = document.getElementById('cursor');
  if (!cursor) return;

  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;
  let curX = mouseX;
  let curY = mouseY;

  // Lag muy sutil para que se sienta "vivo" pero no molesto
  const lag = 0.35;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  function animate() {
    curX += (mouseX - curX) * lag;
    curY += (mouseY - curY) * lag;
    cursor.style.transform = `translate(${curX}px, ${curY}px) translate(-50%, -50%)`;
    requestAnimationFrame(animate);
  }
  animate();

  // Hover en elementos interactivos: agranda el cursor
  function attachHoverListeners() {
    const interactive = document.querySelectorAll('a, button, .proj-card, [data-page], .lang span, #logoLink, [role="button"]');
    interactive.forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });
  }
  attachHoverListeners();

  // Re-attach cuando cambia la página (porque se generan elementos nuevos)
  const observer = new MutationObserver(() => {
    attachHoverListeners();
  });
  observer.observe(document.body, { childList: true, subtree: true });

  // Cuando el mouse sale de la ventana, oculta cursor
  document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
  document.addEventListener('mouseenter', () => cursor.style.opacity = '1');
})();

// ============================================
// PARALLAX SUTIL DEL REEL EN EL HOME
// ============================================
(function initParallax() {
  if (!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;

  // Parallax solo se aplica en desktop (donde se muestra el horizontal)
  const reelVideo = document.querySelector('#page-home .home-reel .reel-horizontal');
  if (!reelVideo) return;

  const maxOffset = 8;

  document.addEventListener('mousemove', (e) => {
    if (!document.getElementById('page-home').classList.contains('active')) return;

    const x = (e.clientX / window.innerWidth - 0.5) * 2;
    const y = (e.clientY / window.innerHeight - 0.5) * 2;

    const offsetX = -x * maxOffset;
    const offsetY = -y * maxOffset;

    reelVideo.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(1.04)`;
    reelVideo.style.transition = 'transform 0.4s ease-out';
  });
})();

</script>
