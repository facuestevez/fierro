<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  /* Ocultar cursor nativo en desktop (en mobile se mantiene el touch normal) */
  @media (hover: hover) and (pointer: fine) {
    html, body, a, button, [role="button"], .proj-card, [data-page], .lang span, #logoLink {
      cursor: none !important;
    }
  }

  /* ==== CURSOR CRUZ DE CÁMARA ==== */
  .cursor {
    position: fixed;
    top: 0; left: 0;
    width: 40px;
    height: 40px;
    pointer-events: none;
    z-index: 10000;
    transform: translate(-50%, -50%);
    transition: width 0.2s ease, height 0.2s ease, opacity 0.2s ease;
    mix-blend-mode: difference;
    display: none;
  }
  @media (hover: hover) and (pointer: fine) {
    .cursor { display: block; }
  }
  .cursor.hover {
    width: 76px;
    height: 76px;
  }
  .cursor svg {
    width: 100%;
    height: 100%;
  }
  .cursor circle {
    transition: r 0.2s ease;
  }
  .cursor line {
    stroke: #fff;
    stroke-width: 1;
    transition: stroke-width 0.2s ease;
  }
  .cursor.hover line { stroke-width: 0.7; }

  /* ==== LOADING SCREEN (proyector 16mm) ==== */
  .loader {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s ease, visibility 0.4s ease;
  }
  .loader.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .loader-frame {
    position: relative;
    width: min(60vw, 60vh);
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .loader-frame::before,
  .loader-frame::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 1.5px solid rgba(255,255,255,0.65);
  }
  .loader-frame::after {
    inset: -22px;
    border: 0.5px solid rgba(255,255,255,0.18);
  }
  /* Cruz central tipo proyector */
  .loader-frame .cross-h,
  .loader-frame .cross-v {
    position: absolute;
    background: rgba(255,255,255,0.25);
  }
  .loader-frame .cross-h {
    left: 0; right: 0;
    top: 50%; height: 1px;
    transform: translateY(-50%);
  }
  .loader-frame .cross-v {
    top: 0; bottom: 0;
    left: 50%; width: 1px;
    transform: translateX(-50%);
  }
  /* Círculo del cuentaregresiva */
  .loader-circle {
    position: absolute;
    width: 75%;
    height: 75%;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.35);
  }
  /* Línea que rota */
  .loader-sweep {
    position: absolute;
    width: 75%;
    height: 75%;
    border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 0deg, rgba(255,255,255,0.45) 350deg, transparent 360deg);
    mask: radial-gradient(circle, transparent 49%, #000 50%, #000 51%, transparent 52%);
    -webkit-mask: radial-gradient(circle, transparent 49%, #000 50%, #000 51%, transparent 52%);
    animation: sweep 1s linear infinite;
  }
  @keyframes sweep {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .loader-number {
    position: relative;
    font-size: clamp(80px, 18vw, 220px);
    font-weight: 500;
    letter-spacing: -0.04em;
    line-height: 1;
    color: #fff;
    z-index: 2;
    font-variant-numeric: tabular-nums;
  }
  .loader-label {
    position: absolute;
    bottom: -50px;
    left: 50%;
    transform: translateX(-50%);
    font-family: "SF Mono", Menlo, Monaco, monospace;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.55);
    white-space: nowrap;
  }
  /* Grano sutil sobre el loader (filmico) */
  .loader::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.05;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    pointer-events: none;
    animation: grain 0.2s steps(4) infinite;
  }
  @keyframes grain {
    0%, 100% { transform: translate(0,0); }
    25% { transform: translate(-2%,-1%); }
    50% { transform: translate(1%,2%); }
    75% { transform: translate(-1%,1%); }
  }

  :root {
    --side-margin: 48px;
    --top-margin: 28px;
  }

  /* ==== FLASH DE TRANSICIÓN ==== */
  .flash {
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease-out;
  }
  .flash.active {
    opacity: 0.85;
    transition: opacity 0.06s ease-in;
  }

  /* ==== HEADER ==== */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--top-margin) var(--side-margin);
    pointer-events: none;
  }
  header > * { pointer-events: auto; }
  .logo { width: 105px; height: auto; cursor: pointer; display: block; }
  nav { display: flex; gap: 36px; align-items: center; }
  nav a {
    color: #fff;
    text-decoration: none;
    font-family: "SF Mono", Menlo, Monaco, monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    padding-bottom: 4px;
    transition: opacity 0.2s;
  }
  nav a:hover { opacity: 0.6; }
  nav a.active { border-bottom: 1px solid #fff; }
  .lang { display: flex; gap: 12px; margin-left: 14px; font-family: "SF Mono", monospace; font-size: 10px; letter-spacing: 0.2em; }
  .lang span { cursor: pointer; opacity: 0.45; transition: opacity 0.2s; }
  .lang span.active { opacity: 1; border-bottom: 1px solid #fff; padding-bottom: 2px; }

  section { display: none; }
  section.active { display: block; }

  /* ==== HOME ==== */
  .home-reel {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
  }
  .home-reel video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1.04);
    transition: transform 0.4s ease-out;
  }
  .home-icons {
    position: absolute;
    bottom: var(--top-margin);
    right: var(--side-margin);
    display: flex;
    gap: 24px;
    z-index: 2;
  }
  .home-icons a {
    color: #fff;
    opacity: 0.85;
    transition: opacity 0.2s, transform 0.2s;
    display: block;
  }
  .home-icons a:hover {
    opacity: 1;
    transform: translateY(-2px);
  }
  .home-icons svg {
    width: 22px;
    height: 22px;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
  }

  /* ==== TRABAJOS / GRILLA 2x2 (entra en una pantalla) ==== */
  .work-page {
    height: 100vh;
    width: 100vw;
    padding: calc(var(--top-margin) + 70px) var(--side-margin) calc(var(--top-margin) + 50px);
    display: flex;
    flex-direction: column;
  }
  .section-label {
    font-family: "SF Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    opacity: 0.5;
    margin-bottom: 16px;
    flex-shrink: 0;
  }
  .work-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 14px;
    flex: 1;
    min-height: 0;
    width: 100%;
  }
  .proj-card {
    cursor: pointer;
    position: relative;
    overflow: hidden;
    background: #111;
    min-height: 0;
  }
  .proj-card video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease, filter 0.3s ease;
    filter: brightness(0.85);
  }
  .proj-card:hover video {
    transform: scale(1.04);
    filter: brightness(1);
  }
  .proj-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 45%);
    pointer-events: none;
  }
  .proj-label {
    position: absolute;
    bottom: 16px;
    left: 20px;
    right: 20px;
    z-index: 2;
    display: flex;
    align-items: baseline;
    gap: 12px;
    font-size: clamp(15px, 1.5vw, 22px);
    font-weight: 500;
    letter-spacing: -0.01em;
    pointer-events: none;
  }
  .proj-label .artist {
    font-family: "SF Mono", monospace;
    font-size: clamp(9px, 0.8vw, 12px);
    letter-spacing: 0.18em;
    opacity: 0.6;
    font-weight: 400;
    text-transform: uppercase;
  }

  /* ==== PÁGINA DE PROYECTO (sin scroll, full screen) ==== */
  .project-page {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }
  .project-video-wrap {
    position: absolute;
    inset: 0;
    background: #000;
  }
  .project-video-wrap video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  /* Gradiente full-width que cubre toda la parte inferior */
  .project-gradient {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 50%;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 40%, rgba(0,0,0,0) 100%);
    z-index: 2;
    pointer-events: none;
  }
  .project-overlay {
    position: absolute;
    bottom: 80px;
    left: var(--side-margin);
    right: var(--side-margin);
    z-index: 3;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 40px;
  }
  .project-title {
    font-size: clamp(40px, 5.5vw, 80px);
    font-weight: 500;
    letter-spacing: -0.03em;
    line-height: 0.95;
    margin-bottom: 10px;
  }
  .project-artist {
    font-family: "SF Mono", monospace;
    font-size: 12px;
    letter-spacing: 0.22em;
    opacity: 0.75;
  }
  .project-credits {
    font-family: "SF Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-align: right;
    line-height: 2;
    min-width: 280px;
  }
  .project-credits .row {
    display: flex;
    justify-content: space-between;
    gap: 24px;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.18);
  }
  .project-credits .row:last-child { border-bottom: none; }
  .project-credits .label { opacity: 0.55; }

  .project-bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 90;
    display: none;
    justify-content: center;
    padding: 18px var(--side-margin);
    font-family: "SF Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
  }
  .project-bottom-bar.visible { display: flex; }
  .project-bottom-bar span {
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
    color: #fff;
  }
  .project-bottom-bar span:hover { opacity: 1; }

  /* ==== CONTACTO ==== */
  .contact-page {
    padding: 140px var(--side-margin) 80px;
    height: 100vh;
    display: none;
    flex-direction: column;
    justify-content: center;
  }
  .contact-page.active { display: flex; }
  .contact-mail {
    font-size: clamp(36px, 6vw, 90px);
    font-weight: 500;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 48px;
    word-break: break-all;
  }
  .contact-mail a { color: #fff; text-decoration: none; transition: opacity 0.2s; }
  .contact-mail a:hover { opacity: 0.7; }
  .contact-mail .at { opacity: 0.5; }
  .contact-links {
    display: flex;
    gap: 36px;
    font-family: "SF Mono", monospace;
    font-size: 12px;
    letter-spacing: 0.22em;
    flex-wrap: wrap;
  }
  .contact-links a {
    color: #fff;
    text-decoration: none;
    border-bottom: 1px solid #fff;
    padding-bottom: 4px;
    transition: opacity 0.2s;
  }
  .contact-links a:hover { opacity: 0.7; }
  .contact-location {
    margin-top: 56px;
    font-family: "SF Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    opacity: 0.45;
  }

  /* ==== FOOTER ==== */
  footer {
    position: fixed;
    bottom: 0; left: 0;
    z-index: 50;
    padding: var(--top-margin) var(--side-margin);
    font-family: "SF Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    opacity: 0.55;
    pointer-events: none;
  }
  footer.hidden { display: none; }

  /* ==== MOBILE ==== */
  @media (max-width: 800px) {
    :root {
      --side-margin: 20px;
      --top-margin: 18px;
    }
    .logo { width: 75px; }
    nav { gap: 18px; }
    .lang { margin-left: 6px; }
    .work-page { padding-top: 80px; padding-bottom: 50px; }
    .work-grid { grid-template-columns: 1fr; grid-template-rows: repeat(4, 1fr); gap: 10px; }
    .home-icons svg { width: 20px; height: 20px; }
    .home-icons { gap: 20px; }
    .project-overlay {
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
      bottom: 60px;
    }
    .project-credits { text-align: left; min-width: 0; width: 100%; font-size: 10px; }
  }
</style>
</head>

        <div class="proj-label"><span>ENERC SE PROYECTA</span><span class="artist">ENERC</span></div>

      <a href="https://instagram.com/fierro.av" target="_blank" rel="noopener">INSTAGRAM ↗</a>
      <a href="https://youtube.com/@fierroaudiovisual" target="_blank" rel="noopener">YOUTUBE ↗</a>

  <span>FIERRO 2026</span>
</footer>

<script>
// ============================================
// DATOS
// ============================================
const projects = [
  { id:0, title:'Viajes de Amor', artist:'JERO JONES', year:'2025', dir:'Lulo Innocenti', prod:'Mayra Zuvilivia · Bruno Levy', video:'viajes-de-amor.mp4' },
  { id:1, title:'ENERC Se Proyecta', artist:'ENERC', year:'2025', dir:'Lulo Innocenti', prod:'Eric Ovelar', video:'enerc.mp4' },
  { id:2, title:'Fervor', artist:'COBERTURA DE SHOW', year:'2025', dir:'Lulo Innocenti', prod:'Bruno Levy · Facundo López Estévez', video:'fervor.mp4' },
  { id:3, title:'Experimento Stanislavski', artist:'BARS 2025', year:'2024', dir:'Lulo Innocenti · Thiago Zavallone', prod:'Bruno Levy · Eric Ovelar', video:'stanislavski.mp4' }
];

// ============================================
// I18N
// ============================================
const translations = {
  es: {
    'nav.work': 'TRABAJOS',
    'nav.contact': 'CONTACTO',
    'nav.backToWork': 'VOLVER A TRABAJOS',
    'section.work': 'TRABAJOS',
    'section.contact': 'CONTACTO',
    'contact.location': 'BUENOS AIRES — ARG',
    'credits.direction': 'DIRECCIÓN',
    'credits.production': 'PRODUCCIÓN',
    'proj.fervor.subtitle': 'COBERTURA DE SHOW'
  },
  en: {
    'nav.work': 'WORK',
    'nav.contact': 'CONTACT',
    'nav.backToWork': 'BACK TO WORK',
    'section.work': 'WORK',
    'section.contact': 'CONTACT',
    'contact.location': 'BUENOS AIRES — ARG',
    'credits.direction': 'DIRECTION',
    'credits.production': 'PRODUCTION',
    'proj.fervor.subtitle': 'LIVE SHOW COVERAGE'
  }
};

let currentLang = 'es';

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (translations[currentLang][key]) {
      el.textContent = translations[currentLang][key];
    }
  });
  document.documentElement.lang = currentLang;
  // Re-renderizar el proyecto si está activo, para traducir los labels
  if (document.getElementById('page-project').classList.contains('active')) {
    const currentProj = document.querySelector('.project-page')?.dataset.projectId;
    if (currentProj !== undefined) {
      renderProject(projects[parseInt(currentProj)], false);
    }
  }
}

// ============================================
// FLASH
// ============================================
function triggerFlash(callback) {
  const flash = document.getElementById('flash');
  flash.classList.add('active');
  setTimeout(() => {
    if (callback) callback();
    setTimeout(() => flash.classList.remove('active'), 60);
  }, 80);
}

// ============================================
// NAVIGATION
// ============================================
const sections = ['home','work','project','contact'];

function showPage(page){
  triggerFlash(() => {
    sections.forEach(s => {
      document.getElementById('page-'+s).classList.remove('active');
    });
    document.getElementById('page-'+page).classList.add('active');

    document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
    const navMap = { work: 'work', contact: 'contact', project: 'work' };
    if(navMap[page]){
      document.querySelectorAll('nav a[data-page]').forEach(a => {
        if(a.getAttribute('data-page') === navMap[page]) a.classList.add('active');
      });
    }

    const bottomBar = document.getElementById('projectBottomBar');
    const footer = document.getElementById('mainFooter');
    if(page === 'project'){
      bottomBar.classList.add('visible');
      footer.classList.add('hidden');
    } else {
      bottomBar.classList.remove('visible');
      footer.classList.remove('hidden');
    }
  });
}

function renderProject(p, withFlash = true){
  const t = translations[currentLang];
  const html = `
    <div class="project-video-wrap">
      <video autoplay muted loop playsinline>
        <source src="${p.video}" type="video/mp4">
      </video>
    </div>
    <div class="project-gradient"></div>
    <div class="project-overlay">
      <div class="project-overlay-text">
        <h1 class="project-title">${p.title}</h1>
        <div class="project-artist">${p.artist} · ${p.year}</div>
      </div>
      <div class="project-credits">
        <div class="row"><span class="label">${t['credits.direction']}</span><span>${p.dir}</span></div>
        <div class="row"><span class="label">${t['credits.production']}</span><span>${p.prod}</span></div>
      </div>
    </div>
  `;
  const container = document.getElementById('project-content');
  container.innerHTML = html;
  container.dataset.projectId = p.id;
}

// ============================================
// EVENT LISTENERS
// ============================================
document.getElementById('navBackWork').addEventListener('click', () => showPage('work'));

document.querySelectorAll('[data-page]').forEach(el => {
  el.addEventListener('click', (e) => {
    e.preventDefault();
    showPage(el.getAttribute('data-page'));
  });
});

document.getElementById('logoLink').addEventListener('click', (e) => {
  e.preventDefault();
  showPage('home');
});

document.querySelectorAll('.proj-card').forEach(card => {
  card.addEventListener('click', () => {
    const id = parseInt(card.getAttribute('data-id'));
    triggerFlash(() => {
      renderProject(projects[id], false);
      sections.forEach(s => document.getElementById('page-'+s).classList.remove('active'));
      document.getElementById('page-project').classList.add('active');
      document.getElementById('projectBottomBar').classList.add('visible');
      document.getElementById('mainFooter').classList.add('hidden');
      document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
      document.querySelectorAll('nav a[data-page="work"]').forEach(a => a.classList.add('active'));
    });
  });
});

// Language switch
document.querySelectorAll('.lang span').forEach(s => {
  s.addEventListener('click', () => {
    document.querySelectorAll('.lang span').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
    currentLang = s.getAttribute('data-lang');
    applyTranslations();
  });
});

// ============================================
// CURSOR PERSONALIZADO (cruz de cámara)
// ============================================
(function initCursor() {
  // Solo si hay mouse fino (no en touch)
  if (!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;

  const cursor = document.getElementById('cursor');
  if (!cursor) return;

  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;
  let curX = mouseX;
  let curY = mouseY;

  // Lag muy sutil para que se sienta "vivo" pero no molesto
  const lag = 0.35;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  function animate() {
    curX += (mouseX - curX) * lag;
    curY += (mouseY - curY) * lag;
    cursor.style.transform = `translate(${curX}px, ${curY}px) translate(-50%, -50%)`;
    requestAnimationFrame(animate);
  }
  animate();

  // Hover en elementos interactivos: agranda el cursor
  function attachHoverListeners() {
    const interactive = document.querySelectorAll('a, button, .proj-card, [data-page], .lang span, #logoLink, [role="button"]');
    interactive.forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });
  }
  attachHoverListeners();

  // Re-attach cuando cambia la página (porque se generan elementos nuevos)
  const observer = new MutationObserver(() => {
    attachHoverListeners();
  });
  observer.observe(document.body, { childList: true, subtree: true });

  // Cuando el mouse sale de la ventana, oculta cursor
  document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
  document.addEventListener('mouseenter', () => cursor.style.opacity = '1');
})();

// ============================================
// LOADING SCREEN (solo primera visita por sesión)
// ============================================
(function initLoader() {
  const loader = document.getElementById('loader');
  const num = document.getElementById('loaderNumber');
  if (!loader || !num) return;

  // Ya vista esta sesión? Saltear.
  const alreadySeen = sessionStorage.getItem('fierro_intro_seen');
  if (alreadySeen) {
    loader.classList.add('hidden');
    setTimeout(() => loader.remove(), 500);
    return;
  }

  // Cuenta regresiva 5 → 4 → 3 → 2 → 1 → ocultar
  const sequence = ['5', '4', '3', '2', '1'];
  let idx = 0;

  // Mostrar primer número de inmediato (ya está en HTML)
  // Luego cambiar cada ~480ms (total ~2.4s)
  const interval = setInterval(() => {
    idx++;
    if (idx < sequence.length) {
      num.textContent = sequence[idx];
    } else {
      clearInterval(interval);
      loader.classList.add('hidden');
      sessionStorage.setItem('fierro_intro_seen', '1');
      setTimeout(() => loader.remove(), 500);
    }
  }, 480);
})();

// ============================================
// PARALLAX SUTIL DEL REEL EN EL HOME
// ============================================
(function initParallax() {
  if (!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;

  const reelVideo = document.querySelector('#page-home .home-reel video');
  if (!reelVideo) return;

  const maxOffset = 8; // píxeles de movimiento máximo

  document.addEventListener('mousemove', (e) => {
    // Solo aplicar si home está activo
    if (!document.getElementById('page-home').classList.contains('active')) return;

    const x = (e.clientX / window.innerWidth - 0.5) * 2; // -1 a 1
    const y = (e.clientY / window.innerHeight - 0.5) * 2;

    const offsetX = -x * maxOffset;
    const offsetY = -y * maxOffset;

    reelVideo.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(1.04)`;
    reelVideo.style.transition = 'transform 0.4s ease-out';
  });
})();

</script>

</body>
</html>
